apiVersion: v1
data:
  name: {{ .Values.repository.name | default "" | b64enc }}
  project: {{ .Values.repository.project | default "" | b64enc }}
  type: {{ .Values.repository.type | default "" | b64enc }}
  url: {{ .Values.repository.url | default "" | b64enc }}
  username: {{ .Values.repository.username | default "" | b64enc }}
  password: {{ .Values.repository.password | default "" | b64enc }}
kind: Secret
metadata:
  annotations:
    managed-by: argocd.argoproj.io
  labels:
    argocd.argoproj.io/secret-type: repository
  name: {{ .Values.repository.name | default "repo-unknown" }}
  namespace: {{ .Values.namespace }}
type: Opaque
