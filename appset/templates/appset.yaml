apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ $config.name | quote }}
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/mteodor/argocd-example-apps.git
        revision: service-env
        files:
          - path: "env/*/*/values.yaml"
  template:
    metadata:
      name: '{{ "{{" }}path[2]{{ "}}" }}-{{ "{{" }}path[1]{{ "}}" }}'
    spec:
      project: {{ $config.project }}
      source:
        repoURL: {{ $config.repoURL }}
        targetRevision: {{ $config.targetRevision }}
        path: 'charts/{{ "{{" }}path[2]{{ "}}" }}'
        helm:
          valueFiles:
            - '../../env/{{ "{{" }}path[1]{{ "}}" }}/{{ "{{" }}path[2]{{ "}}" }}/values.yaml'
      destination:
        namespace: '{{ "{{" }}.cluster{{ "}}" }}-{{ printf "example-%s" .name }}'
        server: https://kubernetes.default.svc
      syncPolicy:
        syncOptions:
        - Replace=true
        - CreateNamespace=true
        automated:
          prune: true
          selfHeal: true