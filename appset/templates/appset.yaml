apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ .Values.config.name | quote }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  generators:
    - git:
        repoURL: https://github.com/mteodor/argocd-example-apps.git
        revision: service-env
        files:
          - path: "env/*/*/values.yaml"

  template:
    metadata:
      name: '{{ "{{" }} index .path.segments 2 {{ "}}" }}-{{ "{{" }} index .path.segments 1 {{ "}}" }}'

    spec:
      project: {{ .Values.config.project }}

      source:
        repoURL: {{ .Values.config.repoURL }}
        targetRevision: {{ .Values.config.targetRevision }}
        path: 'charts/{{ "{{" }} index .path.segments 2 {{ "}}" }}'

        helm:
          valueFiles:
            - '{{ "{{" }} .path.path {{ "}}" }}'

      destination:
        namespace: '{{ "{{" }} index .path.segments 2 {{ "}}" }}-{{ "{{" }} index .path.segments 1 {{ "}}" }}'
        server: https://kubernetes.default.svc

      syncPolicy:
        syncOptions:
          - Replace=true
          - CreateNamespace=true
        automated:
          prune: true
          selfHeal: true